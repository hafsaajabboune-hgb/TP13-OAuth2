<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenue - SecureAuth Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .welcome-card {
            background: white;
            border-radius: 25px;
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: fadeInUp 0.5s ease-out;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .check-icon {
            width: 80px;
            height: 80px;
            background: #28a745;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }
        .check-icon i {
            font-size: 3rem;
            color: white;
        }
        .btn-dashboard {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            margin-top: 1rem;
            transition: transform 0.3s;
        }
        .btn-dashboard:hover {
            transform: translateY(-2px);
            color: white;
        }
        .btn-logout {
            background: #dc3545;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            text-decoration: none;
            display: inline-block;
            margin-left: 0.5rem;
            transition: transform 0.3s;
        }
        .btn-logout:hover {
            background: #c82333;
            color: white;
            transform: translateY(-2px);
        }
        .profile-info {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .profile-picture-small {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }
        .avatar-small {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="welcome-card">
        <div class="check-icon">
            <i class="fas fa-check"></i>
        </div>
        <h1 class="fw-bold mb-3">Bienvenue !</h1>
        <p class="lead mb-3">Votre compte a été créé avec succès.</p>

        <!-- Informations utilisateur / User information -->
        <div class="profile-info">
            <img th:if="${hasProfilePicture}" th:src="${profilePicture}" class="profile-picture-small">
            <div th:unless="${hasProfilePicture}" class="avatar-small">
                <span th:text="${initials}">U</span>
            </div>
            <div class="text-start">
                <strong th:text="${displayName}">Nom</strong><br>
                <small class="text-muted" th:text="${user.email}">email</small>
            </div>
        </div>

        <p class="text-muted mb-4">Vous êtes maintenant connecté à SecureAuth Hub via Google.</p>

        <div>
            <a href="/dashboard/home" class="btn-dashboard">
                <i class="fas fa-tachometer-alt me-2"></i> Accéder au tableau de bord
            </a>
            <!-- LIEN DE DECONNEXION CORRIGE -->
            <a href="/logout" class="btn-logout" onclick="return confirm('Voulez-vous vraiment vous déconnecter ?')">
                <i class="fas fa-sign-out-alt"></i> Déconnexion
            </a>
        </div>
    </div>
</div>
</body>
</html>
